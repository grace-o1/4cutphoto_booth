<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>라이프 네컷</title>
        <link rel="stylesheet" href="./style.css">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-camera" viewBox="0 0 16 16">
        <path d="M15 12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h1.172a3 3 0 0 0 2.12-.879l.83-.828A1 1 0 0 1 6.827 3h2.344a1 1 0 0 1 .707.293l.828.828A3 3 0 0 0 12.828 5H14a1 1 0 0 1 1 1zM2 4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1.172a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 9.172 2H6.828a2 2 0 0 0-1.414.586l-.828.828A2 2 0 0 1 3.172 4z"/>
        <path d="M8 11a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5m0 1a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7M3 6.5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0"/>
        </svg>
        <script src="./scirp2.js" defer></script>
    </head>
    <body>
        <div class="container">
            <i class="bi bi-camera"></i>
            <h1>라이프 네컷</h1>
            <div class="camera-view">
                <!-- <video width="480"  height="680" id="video" autoplay></video> -->
                <!-- <canvas id="canvas" width="480" height="680" style="display: none;"></canvas> -->
                <video id="video" autoplay playsinline></video>
            </div>
            <button id="capture-btn">사진찍기</button>
            <!-- <button id="start-btn"></button> -->
            <!--찍힌 사진들이 여기에 표시됨-->
            <div class="result-area" style="display: none;">
                <h2>photo edit</h2>
                <div class="sticker-palette">
                    <img src="./image/sticker/00.png" class="sticker stickerItems"
                    draggable="true" alt="스티커1">
                    <img src="./image/sticker/11.png" class="sticker stickerItems"
                    draggable="true" alt="스티커2">
                    <img src="./image/sticker/55.png" class="sticker stickerItems"
                    draggable="true" alt="스티커2">
                    <img src="./image/sticker/44.png" class="sticker stickerItems"
                    draggable="true" alt="스티커3">
                    <img src="./image/sticker/66.png" class="sticker stickerItems"
                    draggable="true" alt="스티커3">
                    <img src="./image/sticker/77.png" class="sticker stickerItems"
                    draggable="true" alt="스티커3">
                </div>
                <!-- 스티커를 볼일 최종 사진이 로드될 영역 -->
                <div id="sticker-workspace">
                    <canvas id="final-photo-canvas"></canvas>
                </div>
                <button id="save-final-image-btn">편집 완료 및 저장</button>
            </div> 
        </div>
    </body>
</html>
